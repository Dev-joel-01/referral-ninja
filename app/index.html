<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#39FF14" />
    <meta name="background-color" content="#050B06" />
    <meta name="description" content="Refer friends, earn extra income with Referral Ninja. Pay KSh 200 once, get lifetime access to jobs & earn KSh 100 per referral. Withdraw when you reach KSh 500." />
    <meta name="keywords" content="referral program, earn money, side hustle, Kenya jobs, remote work, internships, referral income" />
    <meta name="author" content="Referral Ninja" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.referralninja.co.ke/" />
    <meta property="og:title" content="Referral Ninja - Turn Referrals Into Income" />
    <meta property="og:description" content="Refer friends, earn extra income. Pay KSh 200 once, get lifetime access to jobs & earn KSh 100 per referral. Withdraw when you reach KSh 500." />
    <meta property="og:image" content="https://www.referralninja.co.ke/icons/icon-192x192.svg" />
    <meta property="og:site_name" content="Referral Ninja" />
    <meta property="og:locale" content="en_KE" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://www.referralninja.co.ke/" />
    <meta property="twitter:title" content="Referral Ninja - Turn Referrals Into Income" />
    <meta property="twitter:description" content="Refer friends, earn extra income. Pay KSh 200 once, get lifetime access to jobs & earn KSh 100 per referral. Withdraw when you reach KSh 500." />
    <meta property="twitter:image" content="https://www.referralninja.co.ke/icons/icon-192x192.svg" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Referral Ninja" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/svg+xml" sizes="16x16" href="/favicon-16x16.svg" />
    <link rel="icon" type="image/svg+xml" sizes="32x32" href="/favicon-32x32.svg" />
    <link rel="icon" type="image/svg+xml" href="/icons/icon-192x192.svg" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.svg" />
    <link rel="manifest" href="/manifest.json" />
    <title>Referral Ninja - Turn Referrals Into Income</title>

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Referral Ninja",
      "description": "Refer friends, earn extra income. Pay KSh 200 once, get lifetime access to jobs & earn KSh 100 per referral.",
      "url": "https://www.referralninja.co.ke",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web Browser",
      "offers": {
        "@type": "Offer",
        "price": "200",
        "priceCurrency": "KES",
        "description": "One-time payment for lifetime access"
      },
      "creator": {
        "@type": "Organization",
        "name": "Referral Ninja"
      },
      "featureList": [
        "Job referrals and applications",
        "Referral earnings tracking",
        "Remote and local job opportunities",
        "Internship placements"
      ]
    }
    </script>
    <style>
      /* Critical CSS for initial load */
      html, body {
        margin: 0;
        padding: 0;
        background-color: #050B06;
        color: #E8FFE8;
        font-family: system-ui, -apple-system, sans-serif;
      }
      #root {
        min-height: 100vh;
      }
      /* Loading spinner */
      .initial-loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #050B06;
        z-index: 9999;
      }
      .initial-loader::after {
        content: '';
        width: 40px;
        height: 40px;
        border: 3px solid rgba(57, 255, 20, 0.2);
        border-top-color: #39FF14;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="initial-loader"></div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
